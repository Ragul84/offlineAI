name: Android CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add swap (stabilize memory for KSP/Kotlin)
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Tune Gradle memory for CI
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx5632m -Xms512m -XX:MaxMetaspaceSize=2048m -XX:CICompilerCount=2 -Dfile.encoding=UTF-8
          org.gradle.workers.max=1
          kotlin.compiler.execution.strategy=in-process
          kotlin.incremental=false
          EOF

      - name: Stop any stale Gradle daemons
        run: ./gradlew --stop || true

      - name: Build debug APK (capture full log)
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace --console=plain \
            -Dorg.gradle.jvmargs="-Xmx5632m -Xms512m -XX:MaxMetaspaceSize=2048m -XX:CICompilerCount=2 -Dfile.encoding=UTF-8" \
            -Dorg.gradle.workers.max=1 \
            -Dkotlin.compiler.execution.strategy=in-process \
            -Dkotlin.incremental=false \
            :app:assembleDebug 2>&1 | tee gradle-build.log

      - name: Show Kotlin compile errors (if any)
        if: failure()
        run: |
          echo "=== First Kotlin error lines ==="
          grep -n "^e: " gradle-build.log | head -n 40 || true
          echo "=== Task failure summary ==="
          grep -n "Compilation error\|Execution failed for task\|BUILD FAILED" gradle-build.log | head -n 40 || true

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: edgeai-tutor-lite-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edgeai-gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn
